<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tentakl Pulpo</title>
<style>
  body{font-family:'Segoe UI',system-ui,sans-serif;background:transparent;margin:0;padding:0;}
  .agent{cursor:pointer;transition:opacity .3s ease;}
  .agent .tentacle{transition:opacity .4s ease, stroke-width .3s ease;}
  .agent .node-ring{transition:all .3s ease;}
  .agent .badge-check,.agent .badge-error,.agent .spinner,.agent .progress-arc{opacity:0;}
  .agent .status-txt{font-size:11px;fill:#8A84A0;}
  .agent.waiting{filter:grayscale(1);opacity:.45;}
  .agent.analyzing .node-circle{animation:pulso 1.6s ease-in-out infinite;}
  .agent.analyzing .tentacle{animation:pulsoT 1.6s ease-in-out infinite;}
  @keyframes pulso{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}
  @keyframes pulsoT{0%,100%{opacity:1;}50%{opacity:.55;}}
  .agent .node-circle{transform-box:fill-box;transform-origin:center;}
  .agent.working .node-circle{filter:drop-shadow(0 0 10px var(--agent-color));}
  .agent.working .tentacle{stroke-width:30;filter:drop-shadow(0 0 6px var(--agent-color));}
  .agent.working .spinner{opacity:1;animation:girar 1.1s linear infinite;transform-box:fill-box;transform-origin:center;}
  .agent.working .progress-arc{opacity:1;}
  @keyframes girar{to{transform:rotate(360deg);}}
  .agent.completed .node-ring{stroke:#16A34A;stroke-width:4;}
  .agent.completed .badge-check{opacity:1;}
  .agent.error .node-ring{stroke:#DC2626;stroke-width:4;}
  .agent.error .badge-error{opacity:1;}
  .agent.error{animation:tiemble .35s ease 1;}
  @keyframes tiemble{25%{transform:translateX(-3px);}75%{transform:translateX(3px);}}
  .agent:hover .tentacle{stroke-width:32;}
  .agent:hover .node-label{font-weight:700;}
  #cuerpo-pulpo{animation:respira 5s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes respira{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const NODES = [
  {id:"estrategia",  path:"M445 395 C 350 330, 280 250, 205 175", cx:175, cy:150, soft:"#EAF1FE", color:"#2563EB", g:[430,400,175,150,"#7C3AED"], emoji:"\u{1F9E0}", es:"Estrategia",  en:"Strategy"},
  {id:"contenido",   path:"M435 430 C 340 415, 250 390, 178 350", cx:150, cy:330, soft:"#EAF7EE", color:"#16A34A", g:[420,430,150,330,"#7C3AED"], emoji:"✍️", es:"Contenido",   en:"Content"},
  {id:"imagenes",    path:"M440 470 C 350 490, 265 505, 192 515", cx:165, cy:520, soft:"#FFF1E8", color:"#F97316", g:[430,470,165,520,"#7C3AED"], emoji:"\u{1F5BC}️", es:"Imágenes", en:"Images"},
  {id:"publicidad",  path:"M465 500 C 400 570, 330 630, 275 670", cx:255, cy:690, soft:"#F3EEFF", color:"#7C3AED", g:[460,500,255,690,"#6D28D9"], emoji:"\u{1F4E3}", es:"Publicidad",  en:"Ads"},
  {id:"metricas",    path:"M555 395 C 650 330, 720 250, 795 175", cx:825, cy:150, soft:"#FDF7E3", color:"#D4A017", g:[570,400,825,150,"#7C3AED"], emoji:"\u{1F4CA}", es:"Métricas", en:"Metrics"},
  {id:"gestion",     path:"M565 430 C 660 415, 750 390, 822 350", cx:850, cy:330, soft:"#F3EEFF", color:"#8B5CF6", g:[580,430,850,330,"#7C3AED"], emoji:"\u{1F4CB}", es:"Gestión", en:"Management"},
  {id:"competencia", path:"M560 470 C 650 490, 735 505, 808 515", cx:835, cy:520, soft:"#FDEEF6", color:"#EC4899", g:[570,470,835,520,"#7C3AED"], emoji:"\u{1F3AF}", es:"Competencia", en:"Competitors"},
  {id:"ventas",      path:"M535 500 C 600 570, 670 630, 725 670", cx:745, cy:690, soft:"#E6F5F3", color:"#0D9488", g:[540,500,745,690,"#6D28D9"], emoji:"\u{1F4B0}", es:"Ventas",      en:"Sales"},
];
const TXT = {
  es:{idle:"Listo", waiting:"Esperando", analyzing:"Analizando...", working:"Trabajando...", completed:"Terminado ✓", error:"Error — reintentar"},
  en:{idle:"Ready", waiting:"Waiting", analyzing:"Analyzing...", working:"Working...", completed:"Done ✓", error:"Error — retry"}
};
const VALID = ["waiting","analyzing","working","completed","error"];

function sendMsg(type, extra){
  window.parent.postMessage(Object.assign({isStreamlitMessage:true, type:type}, extra||{}), "*");
}
function sendValue(v){
  sendMsg("streamlit:setComponentValue", {dataType:"json", value:v});
}

function build(estados, en){
  estados = estados || {};
  const t = TXT[en ? "en" : "es"];
  let defs = '<linearGradient id="gradCuerpo" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#6D28D9"/></linearGradient>' +
    '<radialGradient id="gradMedallon" cx="50%" cy="40%" r="70%">' +
    '<stop offset="0%" stop-color="#2A2545"/><stop offset="100%" stop-color="#15112B"/></radialGradient>';
  let nodes = "";
  for(const n of NODES){
    defs += `<linearGradient id="gt-${n.id}" gradientUnits="userSpaceOnUse" x1="${n.g[0]}" y1="${n.g[1]}" x2="${n.g[2]}" y2="${n.g[3]}">` +
            `<stop offset="0%" stop-color="${n.g[4]}"/><stop offset="85%" stop-color="${n.color}"/></linearGradient>`;
    let estado = estados[n.id] || "idle";
    if(!VALID.includes(estado)) estado = "idle";
    const cls = estado === "idle" ? "" : " " + estado;
    const bx = n.cx + 37, by = n.cy - 35;
    const label = en ? n.en : n.es;
    nodes += `
  <g class="agent${cls}" id="agent-${n.id}" data-agent="${n.id}" style="--agent-color:${n.color}">
    <path class="tentacle" d="${n.path}" fill="none" stroke="url(#gt-${n.id})" stroke-width="26" stroke-linecap="round"/>
    <circle class="node-ring" cx="${n.cx}" cy="${n.cy}" r="52" fill="#fff" stroke="${n.color}" stroke-width="2.5"/>
    <circle class="node-circle" cx="${n.cx}" cy="${n.cy}" r="44" fill="${n.soft}"/>
    <circle class="progress-arc" cx="${n.cx}" cy="${n.cy}" r="52" fill="none" stroke="${n.color}" stroke-width="4" stroke-linecap="round" stroke-dasharray="0 327" transform="rotate(-90 ${n.cx} ${n.cy})"/>
    <circle class="spinner" cx="${n.cx}" cy="${n.cy}" r="52" fill="none" stroke="${n.color}" stroke-width="3" stroke-dasharray="40 287"/>
    <text x="${n.cx}" y="${n.cy+10}" text-anchor="middle" font-size="30">${n.emoji}</text>
    <g class="badge-check"><circle cx="${bx}" cy="${by}" r="14" fill="#16A34A"/><path d="M${bx-7} ${by} l5 5 l10 -10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/></g>
    <g class="badge-error"><circle cx="${bx}" cy="${by}" r="14" fill="#DC2626"/><text x="${bx}" y="${by+6}" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">↻</text></g>
    <text class="node-label" x="${n.cx}" y="${n.cy+78}" text-anchor="middle" font-size="16" font-weight="600" fill="#15112B">${label}</text>
    <text class="status-txt" x="${n.cx}" y="${n.cy+96}" text-anchor="middle">${t[estado]}</text>
  </g>`;
  }
  const cuerpo = `
  <g id="cuerpo-pulpo">
    <ellipse cx="500" cy="330" rx="130" ry="145" fill="url(#gradCuerpo)"/>
    <ellipse cx="455" cy="245" rx="26" ry="34" fill="#A78BFA" opacity=".35"/>
    <rect x="415" y="270" width="170" height="88" rx="40" fill="#15112B"/>
    <rect x="422" y="277" width="156" height="74" rx="34" fill="#1E1938"/>
    <rect x="455" y="298" width="14" height="22" rx="3" fill="#67E8F9"/>
    <rect x="531" y="298" width="14" height="22" rx="3" fill="#67E8F9"/>
    <path d="M470 334 Q500 350 530 334" stroke="#67E8F9" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="378" cy="315" r="20" fill="#5B21B6"/>
    <circle cx="622" cy="315" r="20" fill="#5B21B6"/>
    <circle cx="500" cy="452" r="42" fill="url(#gradMedallon)" stroke="#8B5CF6" stroke-width="4"/>
    <path d="M505 428 L485 458 L500 458 L492 480 L516 448 L501 448 L508 428 Z" fill="#F59E0B"/>
  </g>`;
  document.getElementById("root").innerHTML =
    '<svg viewBox="0 0 1000 860" width="100%" style="max-width:900px;display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">' +
    "<defs>" + defs + "</defs>" + nodes + cuerpo + "</svg>";
  document.querySelectorAll(".agent").forEach(g=>{
    g.addEventListener("click", ()=>{
      sendValue({agente: g.dataset.agent, ts: Date.now()});
    });
  });
}

window.addEventListener("message", (e)=>{
  const d = e.data;
  if(d && d.type === "streamlit:render"){
    const a = d.args || {};
    build(a.estados || {}, !!a.en);
  }
});
sendMsg("streamlit:componentReady", {apiVersion: 1});
sendMsg("streamlit:setFrameHeight", {height: 720});
</script>
</body>
</html>
